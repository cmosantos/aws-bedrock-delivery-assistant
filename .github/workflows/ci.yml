name: Validacao do projeto

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias de desenvolvimento
        run: pip install -r requirements-dev.txt

      - name: Verificar sintaxe Python
        run: python -m compileall -q src scripts tests

      - name: Executar testes
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_EC2_METADATA_DISABLED: 'true'
        run: python -m unittest discover -s tests -v

      - name: Validar template CloudFormation/SAM
        run: cfn-lint template.yaml
